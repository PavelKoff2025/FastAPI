services:
  registry:
    image: registry:2
    container_name: registry
    restart: unless-stopped
    ports:
      - "${REGISTRY_PORT:-5000}:5000"
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: Private Registry
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      REGISTRY_HTTP_TLS_CERTIFICATE: /certs/registry.crt
      REGISTRY_HTTP_TLS_KEY: /certs/registry.key
    volumes:
      - registry-data:/var/lib/registry
      - ./registry/certs:/certs:ro
      - ./registry/auth:/auth:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "--spider", "https://localhost:5000/v2/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    image: ${REGISTRY_HOST}/fastapi-app:${TAG:-latest}
    container_name: fastapi-app
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      WORKERS: ${WORKERS:-1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped
    depends_on:
      registry:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_CONFIG_PATH:-/root/.docker/config.json}:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-30}
      WATCHTOWER_CLEANUP: "true"
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-1.52}
      DOCKER_CONFIG: /
    restart: unless-stopped
    depends_on:
      - api

volumes:
  registry-data:
